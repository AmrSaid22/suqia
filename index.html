<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Suqia Africa | AI Systems v5.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --main: #00b4d8; --bg: #0b0f1a; --card: #161c2d; --text: #f0fdfa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        nav { display: flex; justify-content: space-between; padding: 15px 5%; background: var(--card); border-bottom: 2px solid var(--main); }
        .hero { padding: 40px 20px; background: linear-gradient(to bottom, #0077b611, transparent); }
        .live-counter { font-size: 3.5rem; font-weight: bold; color: var(--main); margin: 10px 0; font-family: monospace; text-shadow: 0 0 10px rgba(0,180,216,0.3); }
        .main-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; padding: 20px 5%; max-width: 1300px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid #2d3748; text-align: right; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        #map { height: 400px; width: 100%; border-radius: 12px; margin-top: 15px; background: #0d1117; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0b0f1a; border: 1px solid #4a5568; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--main); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #0077b6; transform: scale(1.02); }
        .profile-box { background: rgba(0, 180, 216, 0.1); padding: 20px; border-radius: 10px; border-right: 4px solid var(--main); display: none; text-align: center; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <div style="color: var(--main); font-weight: bold; letter-spacing: 1px;">SUQIA_CORE_v5</div>
        <div id="nav-status">STATUS: ONLINE</div>
    </nav>

    <section class="hero">
        <div style="color: var(--main); font-size: 0.8rem; letter-spacing: 2px;">REAL-TIME IMPACT DATA</div>
        <div class="live-counter" id="water-counter">1,450,230</div>
        <p>لتر مياه نقية تم ضخها عبر شبكة آبار سُقيا</p>
    </section>

    <div class="main-grid">
        <div class="card">
            <h3><i class="fas fa-satellite"></i> نظام التتبع الجغرافي للآبار</h3>
            <div id="map"></div>
        </div>

        <div class="card">
            <div id="login-form">
                <h3><i class="fas fa-user-lock"></i> بوابة المتطوعين</h3>
                <p style="font-size: 0.8rem; color: #a0aec0;">سجل دخولك لمحاكاة الربط مع قاعدة البيانات.</p>
                <input type="text" id="userName" placeholder="الاسم الكامل">
                <input type="email" id="userEmail" placeholder="البريد الإلكتروني">
                <button class="btn" onclick="executeLogin()">دخول النظام</button>
            </div>

            <div id="user-profile" class="profile-box">
                <div style="font-size: 3rem; margin-bottom: 10px;">👤</div>
                <h3 id="welcome-name" style="margin: 0; color: var(--main);"></h3>
                <p>مرحباً بك في نظام إدارة الأثر. تم توثيق دخولك بنجاح.</p>
                <button class="btn" style="background: #e53e3e;" onclick="location.reload()">تسجيل الخروج</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. منطق العداد
        let waterVal = 1450230;
        setInterval(() => {
            waterVal += Math.floor(Math.random() * 3) + 1;
            document.getElementById('water-counter').innerText = waterVal.toLocaleString();
        }, 2000);

        // 2. منطق الخريطة
        try {
            const map = L.map('map').setView([5.0, 20.0], 3);
            L.
                tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            // نقاط الآبار
            const wells = [
                {n: "بئر النور - مالاوي", c: [-13.25, 34.30]},
                {n: "بئر الكرامة - تشاد", c: [15.45, 18.73]}
            ];
            wells.forEach(w => {
                L.marker(w.c).addTo(map).bindPopup(w.n);
            });
        } catch (e) {
            console.error("Map initialization failed. Check internet connection.");
        }

        // 3. منطق تسجيل الدخول
        function executeLogin() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;

            if (name.trim() !== "" && email.trim() !== "") {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('welcome-name').innerText = "أهلاً، " + name;
                document.getElementById('nav-status').innerText = "LOGGED_IN: " + name.toUpperCase();
            } else {
                alert("برجاء إدخال الاسم والإيميل لتجربة النظام.");
            }
        }
    </script>
</body>
</html>
