<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suqia AI | Extreme Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0077b6; --s: #03045e; --a: #00f2ff; --bg: #0b0e14; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; }
        
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Header AI Style */
        .header-box { background: linear-gradient(45deg, #03045e, #0077b6); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--a); box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        .ai-status { font-family: 'JetBrains Mono'; color: var(--a); font-size: 0.8rem; margin-bottom: 10px; }

        /* Grid System */
        .grid-main { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 30px; }
        .card { background: #151921; border-radius: 15px; padding: 25px; border: 1px solid #252a34; }
        
        /* Chart Box */
        .chart-container { height: 300px; position: relative; }

        /* Real-time Alerts */
        .alert-box { background: rgba(231, 76, 60, 0.1); border-left: 4px solid #e74c3c; padding: 15px; margin-top: 10px; border-radius: 8px; }
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-ai { background: transparent; border: 1px solid var(--a); color: var(--a); padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: 'JetBrains Mono'; transition: 0.3s; }
        .btn-ai:hover { background: var(--a); color: var(--s); }

        @media (max-width: 768px) { .grid-main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div class="ai-status">> SYSTEM_ACTIVE: OPTIMIZING_WATER_FLOW</div>
        <h1 style="margin:0;">SUQIA AFRICA <span style="color:var(--a)">v3.0</span></h1>
        <p>الجيل الثالث: إدارة الموارد المائية باستخدام التعلم الآلي</p>
    </div>

    <div class="grid-main">
        <div class="card">
            <h3><i class="fas fa-chart-area"></i> تحليل تدفق المياه الأسبوعي</h3>
            <div class="chart-container">
                <canvas id="waterChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-microchip"></i> محرك التنبؤ AI</h3>
            <div id="ai-updates">
                <div class="alert-box">
                    <small>الوضع الحالي:</small>
                    <p style="margin:5px 0"><strong>مستقر</strong></p>
                </div>
                <div class="alert-box" style="border-left-color: var(--a); background: rgba(0,242,255,0.05);">
                    <small>توقع الجفاف القادم:</small>
                    <p style="margin:5px 0">بعد <strong>42 يوم</strong></p>
                </div>
                <button class="btn-ai" onclick="runDiagnostic()">RUN_DIAGNOSTIC</button>
            </div>
        </div>
    </div>

    <div class="grid-main" style="grid-template-columns: 1fr 1fr 1fr; text-align: center;">
        <div class="card"><span id="pump-val" class="ai-status" style="font-size: 2rem;">--</span><br>لتر/ساعة</div>
        <div class="card"><span id="moisture-val" class="ai-status" style="font-size: 2rem;">--</span><br>رطوبة التربة</div>
        <div class="card"><span id="energy-val" class="ai-status" style="font-size: 2rem;">--</span><br>طاقة شمسية</div>
    </div>
</div>

<script>
    // تحريك الأرقام لتبدو حقيقية
    setInterval(() => {
        document.getElementById('pump-val').innerText = (Math.random() * (120 - 110) + 110).toFixed(1);
        document.getElementById('moisture-val').innerText = (Math.random() * (45 - 40) + 40).toFixed(1) + "%";
        document.getElementById('energy-val').innerText = (Math.random() * (100 - 95) + 95).toFixed(1) + "%";
    }, 2000);

    // إنشاء الرسم البياني
    const ctx = document.getElementById('waterChart').getContext('2d');
    const waterChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'],
            datasets: [{
                label: 'كمية الضخ (لتر)',
                data: [1200, 1900, 1500, 2500, 2200, 3000, 2800],
                borderColor: '#00f2ff',
                backgroundColor: 'rgba(0, 242, 255, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { grid: { color: '#252a34' } }, x: { grid: { display: false } } }
        }
    });

    function runDiagnostic() {
        alert("Running AI Diagnostic... Patterns: NORMAL. Pump Integrity: 98.4%. Water Quality: CLEAN.");
    }
</script>

</body>
</html>
